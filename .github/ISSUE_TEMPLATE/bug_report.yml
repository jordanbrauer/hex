name: Bug report
description: Something in hex or the hex CLI isn't working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search [existing issues](https://github.com/jordanbrauer/hex/issues)
        first to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: hex version
      description: Output of `hex --version`, or the go.mod `require github.com/jordanbrauer/hex` line.
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of hex is affected?
      options:
        - cmd/hex (scaffolder / generators)
        - Framework package (container, provider, events, config, ...)
        - Lua runtime / REPL
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Minimal steps to reproduce. Commands run, code snippets, or a
        link to a minimal repo/gist are the fastest path to a fix.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version (`go version`), OS/arch, and anything else relevant.
      render: shell
