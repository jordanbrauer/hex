name: release

on:
  release:
    types: [published]

permissions:
  # goreleaser uploads assets to the release and commits the updated
  # Formula/hex.rb back to main. Both need contents: write.
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history for the changelog step.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # pandoc renders the manpages in GoReleaser's `before` hook so they
      # can be packaged into the archives and installed by the formula.
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # pkg.go.dev indexes whatever version the Go module proxy has
      # cached, and the proxy only fetches a tag on first request. Hit
      # it here rather than waiting on some consumer's `go get` to do
      # it, so pkg.go.dev shows the new version within minutes of the
      # release instead of whenever. See docs/release.md.
      - name: Trigger pkg.go.dev indexing
        run: curl -fsSL "https://proxy.golang.org/github.com/jordanbrauer/hex/@v/${{ github.event.release.tag_name }}.info"
