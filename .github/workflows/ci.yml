name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  # qa: fast static checks. Runs in parallel with build.
  qa:
    name: qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # build: compile every package. Runs in parallel with qa.
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: build
        run: go build ./...

  # test: only runs after both qa and build succeed. If either
  # upstream job fails the code is considered unrunnable and we
  # skip the (much slower) test suite entirely.
  test:
    name: test
    needs: [qa, build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: test (race)
        run: go test -race ./...
