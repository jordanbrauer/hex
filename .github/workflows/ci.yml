name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # qa: fast static checks. Runs in parallel with build.
  qa:
    name: qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # go-version-file reads the exact version from go.mod (e.g.
      # 1.26.5), avoiding "1.26" resolving to some cached older
      # patch that go.mod's directive rejects.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # golangci-lint-action@v8 defaults to v2 binaries. The explicit
      # `version` pin keeps CI on the exact release contributors run
      # locally via `just lint` (Homebrew currently ships v2.12.2);
      # bump both together when upgrading.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  # build: compile every package. Runs in parallel with qa.
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

  # test: only runs after both qa and build succeed. If either
  # upstream job fails the code is considered unrunnable and we
  # skip the (much slower) test suite entirely.
  test:
    name: test
    needs: [qa, build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Coverage profile is generated on every matrix leg (so failing
      # tests on either OS still surface), but only ubuntu uploads to
      # Codecov. Two uploads per run would double-count line hits.
      # -covermode=atomic is required with -race.
      - name: test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          fail_ci_if_error: false
