name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # qa: fast static checks. Runs in parallel with build.
  qa:
    name: qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # go-version-file reads the exact version from go.mod (e.g.
      # 1.26.5), avoiding "1.26" resolving to some cached older
      # patch that go.mod's directive rejects.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # golangci-lint-action@v8 defaults to v2 binaries. The explicit
      # `version` pin keeps CI on the exact release contributors run
      # locally via `just lint` (Homebrew currently ships v2.12.2);
      # bump both together when upgrading.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  # docs: the generated manpage markdown (docs/man/hex.{1,3}.md) must stay
  # in sync with the command tree, help files, and Lua type stubs. This is
  # pure Go — no pandoc needed (the roff render happens at release time),
  # so the check is not sensitive to a pandoc version. Fails if `gen-man`
  # would change a committed source.
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: regenerate manpage markdown
        run: go run ./cmd/hex gen-man

      - name: check for drift
        run: |
          if ! git diff --quiet -- docs/man; then
            echo "Generated manpage markdown is stale."
            echo "Run 'just man' (or 'go run ./cmd/hex gen-man') and commit docs/man/*.md."
            git diff -- docs/man
            exit 1
          fi

  # build: compile every package. Runs in parallel with qa.
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

  # test: only runs after both qa and build succeed. If either
  # upstream job fails the code is considered unrunnable and we
  # skip the (much slower) test suite entirely.
  test:
    name: test
    needs: [qa, build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Coverage profile is generated on every matrix leg (so failing
      # tests on either OS still surface), but only ubuntu uploads to
      # Codecov. Two uploads per run would double-count line hits.
      # -covermode=atomic is required with -race.
      - name: test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

      # Coverage upload is best-effort. Codecov outages, network
      # blips, or missing tokens should never fail an otherwise-
      # passing build. Threshold checks (see .codecov.yml) are also
      # informational, so nothing coverage-related blocks a merge.
      #
      # `if: always()` runs the upload even when the test step failed,
      # so partial coverage is still visible on flaky CI runs.
      #
      # Every matrix leg uploads with an OS flag. Codecov unions
      # coverage across flags (atomic mode reports hit/miss, not
      # counters — no double-counting) and surfaces per-OS breakdowns
      # in the UI. Catches OS-specific code paths that only one leg
      # exercises.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: ${{ matrix.os }}
          fail_ci_if_error: false
